<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Add User</title>
</head>
<body>
<section>
    <h2 class="mb-4">Add New User</h2>

    <form th:action="@{/admin/users}"
          th:object="${user}"
          method="post"
          class="mt-3">

        <!-- Username -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="email" th:field="*{username}" class="form-control"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{username}"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{password}"></div>
        </div>

        <!-- Role -->
        <div class="mb-3">
            <label class="form-label">Role</label>
            <select th:field="*{role}" class="form-select"
                    th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'">
                <option value="">-- Select Role --</option>
                <option th:each="role : ${roles}"
                        th:value="${role}"
                        th:text="${role}">
                </option>
            </select>
            <div class="invalid-feedback" th:errors="*{role}"></div>
        </div>

        <button type="submit" class="btn btn-success">Create User</button>
        <a href="/admin/users" class="btn btn-secondary">Cancel</a>

    </form>
</section>
</body>
</html>
