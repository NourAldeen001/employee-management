<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Manage Users</title>
</head>
<body>
<section>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Manage Users</h2>
        <a href="/admin/users/new" class="btn btn-primary">+ Add User</a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.username}"></td>
            <td>
                <span th:text="${user.role}"
                      th:classappend="${user.role.name() == 'ADMIN'}
                      ? 'badge bg-danger'
                      : 'badge bg-secondary'">
                </span>
            </td>
            <td>
                <span th:text="${user.enabled} ? 'Active' : 'Disabled'"
                      th:classappend="${user.enabled}
                      ? 'badge bg-success'
                      : 'badge bg-secondary'">
                </span>
            </td>
            <td class="d-flex gap-1">
                <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                   class="btn btn-sm btn-warning">
                    Edit Role
                </a>
                <a th:href="@{/admin/users/{id}/toggle(id=${user.id})}"
                   class="btn btn-sm btn-secondary"
                   th:text="${user.enabled} ? 'Disable' : 'Enable'">
                </a>
                <a th:href="@{/admin/users/{id}/delete(id=${user.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Are you sure?')">
                    Delete
                </a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="4" class="text-center text-muted">No users found</td>
        </tr>
        </tbody>
    </table>

</section>
</body>
</html>
