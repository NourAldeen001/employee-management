<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout(~{::title}, ~{::section})">
<head>
    <title th:text="${employee.id == null} ? 'Add Employee' : 'Edit Employee'">Form</title>
</head>
<body>
    <section>
        <h2 th:text="${employee.id == null} ? 'Add Employee' : 'Edit Employee'"></h2>
        <form th:action="${employee.id == null
                            ? '/employees'
                            : '/employees/' + employee.id + '/edit'}"
              th:object="${employee}"
              method="post"
              class="mt-3">

            <!-- First Name -->
            <div class="mt-3">
                <label class="form-label">First Name</label>
                <input type="text" th:field="*{firstName}" class="form-control"
                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{firstName}"></div>
            </div>

            <!-- Last Name -->
            <div class="mt-3">
                <label class="form-label">Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control"
                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{lastName}"></div>
            </div>

            <!-- Email -->
            <div class="mt-3">
                <label class="form-label">Email</label>
                <input type="text" th:field="*{email}" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>

            <!-- Department -->
            <div class="mt-3">
                <label class="form-label">Department</label>
                <input type="text" th:field="*{department}" class="form-control"
                       th:classappend="${#fields.hasErrors('department')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{department}"></div>
            </div>

            <!-- Salary -->
            <div class="mt-3">
                <label class="form-label">Salary</label>
                <input type="number" step="0.01" th:field="*{salary}" class="form-control"
                       th:classappend="${#fields.hasErrors('salary')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{salary}"></div>
            </div>

            <button type="submit" class="btn btn-success"
                    th:text="${employee.id == null} ? 'Add Employee' : 'Update Employee'">
            </button>
            <a href="/employees" class="btn btn-secondary">Cancel</a>
        </form>
    </section>
</body>
</html>
